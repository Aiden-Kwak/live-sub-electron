appId: com.livesub.desktop
productName: LiveSub Desktop
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
mac:
  category: public.app-category.productivity
  target:
    - dmg
dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
